substitutions:
  _REGION: us-central1
  _REPO: voice-repo
  _SERVICE: voice-service

steps:

  # ============================================
  # BUILD IMAGE
  # ============================================

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - .

  # ============================================
  # PUSH IMAGE
  # ============================================

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA

  # ============================================
  # DEPLOY CLOUD RUN
  # ============================================

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=2Gi
      - --cpu=2
      - --timeout=3600             # Optimized to keep WebSocket connections alive for up to 1 hour
      - --no-cpu-throttling        # Keeps CPU active for uninterrupted streaming
      - --concurrency=1000         # Allows 1,000 WebSocket connections per container
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GOOGLE_LOCATION=${_REGION}
      # 🟢 FIXED CORRECT FLAG NAMES FOR GCLOUD BELOW:
      - --startup-probe-path=/health
      - --cpu-boost

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA

# ============================================
# BUILD LOGGING FIX
# ============================================

options:
  logging: CLOUD_LOGGING_ONLY